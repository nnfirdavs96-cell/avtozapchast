<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 400" fill="none">
  <defs>
    <linearGradient id="shFace" x1="0.15" y1="0" x2="0.85" y2="1">
      <stop offset="0" stop-color="#f33"/>
      <stop offset="0.5" stop-color="#d31313"/>
      <stop offset="1" stop-color="#8f0606"/>
    </linearGradient>
    <linearGradient id="shEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff5a5a"/>
      <stop offset="1" stop-color="#6b0404"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.35" stop-color="#dfe3e9"/>
      <stop offset="0.55" stop-color="#9aa1ad"/>
      <stop offset="0.75" stop-color="#eef0f4"/>
      <stop offset="1" stop-color="#7d828d"/>
    </linearGradient>
    <linearGradient id="swoosh" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c2c7d0"/>
    </linearGradient>
    <linearGradient id="aFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cfd4dc"/>
    </linearGradient>
  </defs>

  <!-- shield: outer bevel -->
  <path d="M190 8 L356 60 V196 C356 290 286 350 190 392 C94 350 24 290 24 196 V60 Z"
        fill="url(#shEdge)"/>
  <!-- shield: face -->
  <path d="M190 26 L338 72 V194 C338 276 278 330 190 368 C102 330 42 276 42 194 V72 Z"
        fill="url(#shFace)"/>
  <!-- inner thin highlight -->
  <path d="M190 40 L322 82 V192 C322 264 270 312 190 348 C110 312 58 264 58 192 V82 Z"
        fill="none" stroke="#ff7a7a" stroke-width="2.5" opacity="0.45"/>

  <!-- gear ring (darker red, behind) -->
  <g transform="translate(190 188)" fill="#7d0707">
    <g>
      <rect x="-15" y="-128" width="30" height="38" rx="5"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(40)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(80)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(120)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(160)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(200)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(240)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(280)"/>
      <rect x="-15" y="-128" width="30" height="38" rx="5" transform="rotate(320)"/>
    </g>
    <circle r="108"/>
    <circle r="78" fill="url(#shFace)"/>
  </g>

  <!-- dynamic swoosh ribbon -->
  <path d="M70 250 C 120 150 220 120 330 96 C 250 150 210 210 196 286 C 160 250 110 240 70 250 Z"
        fill="url(#swoosh)" opacity="0.95"/>
  <path d="M82 244 C 140 168 230 138 312 110 C 244 158 210 214 198 270"
        fill="none" stroke="#aab0bb" stroke-width="2" opacity="0.5"/>

  <!-- bold angular A -->
  <path d="M190 78 L250 300 H214 L201 250 H179 L166 300 H130 Z
           M186 214 H194 L190 178 Z"
        fill="url(#aFill)" stroke="#8f0606" stroke-width="3"/>

  <!-- chrome wrench, diagonal (open jaw top-right) -->
  <g transform="translate(190 196) rotate(38)">
    <g fill="url(#chrome)" stroke="#7d828d" stroke-width="2" stroke-linejoin="round">
      <!-- open-end head (top) -->
      <path d="M-44 -176
               L-44 -150 A48 48 0 1 0 44 -150 L44 -176
               L20 -176 L20 -150 A24 24 0 1 1 -20 -150 L-20 -176 Z"/>
      <!-- shaft -->
      <rect x="-17" y="-150" width="34" height="290" rx="14"/>
      <!-- adjustable/box head (bottom) -->
      <circle cx="0" cy="150" r="48"/>
    </g>
    <circle cx="0" cy="150" r="23" fill="url(#shFace)" stroke="#7d828d" stroke-width="2"/>
  </g>
</svg>
