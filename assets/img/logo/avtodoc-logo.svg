<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1360 360" fill="none">
  <defs>
    <linearGradient id="adShield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ef2b2b"/>
      <stop offset="1" stop-color="#b30d0d"/>
    </linearGradient>
    <linearGradient id="adMetal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#c4c9d2"/>
    </linearGradient>
    <linearGradient id="adRedTxt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff3636"/>
      <stop offset="1" stop-color="#c30f0f"/>
    </linearGradient>
    <linearGradient id="adWhiteTxt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#cad0d9"/>
    </linearGradient>
  </defs>

  <!-- ===== EMBLEM ===== -->
  <g transform="translate(40 26)">
    <!-- shield -->
    <path d="M150 6 L290 54 V178 C290 256 226 300 150 326 C74 300 10 256 10 178 V54 Z"
          fill="url(#adShield)" stroke="#7e0606" stroke-width="6"/>
    <path d="M150 24 L268 64 V176 C268 240 216 278 150 302 C84 278 32 240 32 176 V64 Z"
          fill="none" stroke="#ff7373" stroke-width="3" opacity="0.5"/>

    <!-- gear -->
    <g transform="translate(150 166)">
      <g fill="url(#adMetal)">
        <rect x="-13" y="-104" width="26" height="34" rx="5"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(36)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(72)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(108)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(144)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(180)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(216)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(252)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(288)"/>
        <rect x="-13" y="-104" width="26" height="34" rx="5" transform="rotate(324)"/>
        <circle r="84"/>
      </g>
      <circle r="60" fill="url(#adShield)"/>
      <circle r="40" fill="url(#adMetal)"/>
      <!-- A monogram -->
      <path d="M0 -34 L27 34 H13 L7.5 19 H-7.5 L-13 34 H-27 Z M-3 7 H3 L0 -10 Z"
            fill="#b30d0d"/>
    </g>

    <!-- combination wrench across -->
    <g transform="translate(150 166) rotate(-40)"
       stroke="url(#adMetal)" stroke-width="24" fill="none" stroke-linecap="round">
      <line x1="0" y1="-120" x2="0" y2="120"/>
      <path d="M22 -176 A40 40 0 1 0 22 -120"/>
      <path d="M-22 176 A40 40 0 1 0 -22 120"/>
    </g>
  </g>

  <!-- ===== WORDMARK ===== -->
  <text x="350" y="252" font-family="'Arial Black','Arial',sans-serif"
        font-weight="900" font-style="italic" font-size="190" letter-spacing="-7">
    <tspan fill="url(#adRedTxt)">Avto</tspan><tspan fill="url(#adWhiteTxt)">Doc</tspan>
  </text>
  <rect x="356" y="276" width="900" height="9" rx="4" fill="url(#adRedTxt)" opacity="0.8"/>
</svg>
