# =============================================================================
#  Конфиг с разделением по адресу (включить, когда будет домен avtodoc.tj).
#
#  avtodoc.tj          -> магазин для покупателей, /admin закрыт (404)
#  10.230.13.107 (IP)  -> магазин + админка (адрес знаешь только ты)
#
#  Порт 8888 НЕ нужен — разделение по заголовку Host, всё на порту 80.
#
#  Как включить:
#   1. Купить домен avtodoc.tj, прописать DNS A-запись на публичный IP сервера.
#   2. cp deploy/nginx-avtozapchast-domain.conf /etc/nginx/sites-available/avtozapchast
#   3. Заменить avtodoc.tj на реальный домен (если другой).
#   4. /usr/sbin/nginx -t && systemctl reload nginx
#
#  Чтобы добавить пароль nginx на админ-IP — раскомментируй две строки
#  auth_basic в блоке "АДМИНКА ПО IP" и создай файл:
#   htpasswd -bc /etc/nginx/.htpasswd boss 'твой_пароль'
# =============================================================================

# ----- МАГАЗИН ДЛЯ ПОКУПАТЕЛЕЙ (домен) -- /admin закрыт ----------------------
server {
    listen 80 default_server;
    server_name avtodoc.tj www.avtodoc.tj;
    root /var/www/html/avtozapchast;
    index index.php index.html;

    location ~ ^/(admin|superadmin|manager)(/|$) {
        return 404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}

# ----- АДМИНКА ПО IP (адрес знаешь только ты) -- всё открыто -----------------
server {
    listen 80;
    server_name 10.230.13.107;
    root /var/www/html/avtozapchast;
    index index.php index.html;

    # Чтобы включить пароль nginx на админ-разделы — раскомментируй:
    # location ~ ^/(admin|superadmin|manager)(/|$) {
    #     auth_basic "Sluzhebnaya zona AvtoDoc";
    #     auth_basic_user_file /etc/nginx/.htpasswd;
    #     try_files $uri $uri/ /index.php?$query_string;
    #     location ~ \.php$ {
    #         auth_basic "Sluzhebnaya zona AvtoDoc";
    #         auth_basic_user_file /etc/nginx/.htpasswd;
    #         include snippets/fastcgi-php.conf;
    #         fastcgi_pass unix:/run/php/php8.2-fpm.sock;
    #         fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    #         include fastcgi_params;
    #     }
    # }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location /phpmyadmin {
        root /usr/share/;
        index index.php;
        location ~ \.php$ {
            include snippets/fastcgi-php.conf;
            fastcgi_pass unix:/run/php/php8.2-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
        }
    }

    location ~ /\.ht {
        deny all;
    }
}
